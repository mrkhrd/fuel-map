name: release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  # bump patch of the latest v* tag (v0.1.0 if none) and push the new tag
  version:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.bump.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Bump version and tag
        id: bump
        run: |
          last=$(git tag --list 'v*' --sort=-v:refname | head -n1)
          if [ -z "$last" ]; then
            new="v0.1.0"
          else
            IFS=. read -r major minor patch <<< "${last#v}"
            new="v$major.$minor.$((patch+1))"
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$new"
          git push origin "$new"
          echo "tag=$new" >> "$GITHUB_OUTPUT"

  windows-zip:
    needs: version
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build
        env:
          APP_VERSION: ${{ needs.version.outputs.tag }}
        run: cargo build --release
      - name: Pack zip
        shell: pwsh
        run: Compress-Archive -Path target/release/fuel-host.exe, README.md -DestinationPath "fuel-map-${{ needs.version.outputs.tag }}-win64.zip"
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: ${{ needs.version.outputs.tag }}
          files: fuel-map-*.zip
          generate_release_notes: true

  docker:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            APP_VERSION=${{ needs.version.outputs.tag }}
          tags: |
            ghcr.io/${{ github.repository }}:${{ needs.version.outputs.tag }}
            ghcr.io/${{ github.repository }}:latest
